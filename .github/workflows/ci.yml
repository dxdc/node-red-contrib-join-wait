name: CI

on:
  push:
    branches: [master, main]
    tags: ['v*.*.*']
  pull_request:

jobs:
  quality:
    name: Lint, format & spellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run format:check
      - run: npm run spellcheck

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - run: npm install --no-audit --no-fund
      # Coverage runs tests, so on Node 24 (the LTS we publish from) we
      # replace `npm test` with the coverage script and publish the
      # artifact. Other Node versions just run the suite.
      - if: matrix.node == 24
        run: npm run coverage
      - if: matrix.node != 24
        run: npm test
      - if: matrix.node == 24
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage/

  release:
    name: Publish to npm
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [quality, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - run: npm install --no-audit --no-fund
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
